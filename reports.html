<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="flex gap-4">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="calendar.html" class="nav-link">Calendar</a>
                <a href="reports.html" class="nav-link" style="color:var(--primary)">Reports</a>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="themeBtn"></button>
                <a href="profile.html">
                    <img id="navAvatar" src="https://ui-avatars.com/api/?name=User" class="nav-avatar">
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto p-6 md:p-10">
        <header class="mb-10 animate-fade">
            <h1 class="text-4xl font-black mb-2">Progress Analytics</h1>
            <p class="text-slate-500 font-medium">A visual breakdown of your academic journey.</p>
        </header>

        <div id="reportContainer" class="grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
            </div>
    </main>

    <script>
        async function init() {
            const user = await checkUser();
            if (!user) return;
            loadNavAvatar();

            const { data } = await supabaseClient
                .from('study_progress')
                .select('data_json')
                .eq('user_id', user.id)
                .maybeSingle();

            const studyData = data?.data_json || [];
            renderReports(studyData);
        }

        function renderReports(data) {
            const container = document.getElementById('reportContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full glass-card p-12 text-center">
                    <p class="text-slate-400 font-bold">No data found. Add subjects in the Dashboard to see reports.</p>
                </div>`;
                return;
            }

            data.forEach((sub, index) => {
                // Calculate Stats
                let totalTasks = sub.chapters.length * 4;
                let completed = 0;
                sub.chapters.forEach(c => {
                    if(c.mcq) completed++;
                    if(c.book) completed++;
                    if(c.testPaper) completed++;
                    if(c.qb) completed++;
                });

                const percentage = totalTasks > 0 ? Math.round((completed / totalTasks) * 100) : 0;
                const remaining = totalTasks - completed;

                // Create Card
                const card = document.createElement('div');
                card.className = "glass-card p-6 animate-fade";
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-xl font-black truncate pr-2">${sub.name}</h2>
                        <span class="bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 px-3 py-1 rounded-full text-xs font-black">
                            ${percentage}%
                        </span>
                    </div>
                    
                    <div class="relative h-[200px] w-full flex justify-center">
                        <canvas id="chart-${index}"></canvas>
                    </div>

                    <div class="mt-6 space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-500 font-bold">Completed Tasks</span>
                            <span class="font-black text-indigo-500">${completed}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-500 font-bold">Pending Tasks</span>
                            <span class="font-black text-slate-400">${remaining}</span>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // Initialize Chart
                const isDark = document.body.classList.contains('dark');
                const ctx = document.getElementById(`chart-${index}`).getContext('2d');
                
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Done', 'Pending'],
                        datasets: [{
                            data: [completed, remaining === 0 && completed === 0 ? 1 : remaining],
                            backgroundColor: [
                                '#6366f1', // Primary Indigo
                                isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'
                            ],
                            borderWidth: 0,
                            borderRadius: 10,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        cutout: '75%',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: true }
                        }
                    }
                });
            });
        }

        init();
    </script>
</body>
</html>
