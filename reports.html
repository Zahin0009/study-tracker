<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports | Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white/80 sticky top-0 z-50 backdrop-blur-md border-b border-slate-200 p-4">
        <div class="max-w-5xl mx-auto flex gap-8 font-semibold text-slate-600">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="calendar.html" class="nav-link">Calendar</a>
            <a href="reports.html" class="nav-link text-indigo-600">Reports</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-10">
        <h1 class="text-4xl font-black mb-10 animate-fade">Detailed Progress</h1>
        <div id="reportContainer" class="space-y-12">
            <p class="text-slate-400">Fetching latest stats...</p>
        </div>
    </div>

    <script>
        async function loadReports() {
            const user = await checkUser();
            const { data } = await supabase.from('study_progress').select('data_json').eq('user_id', user.id).single();
            const studyData = data?.data_json || [];
            
            const container = document.getElementById('reportContainer');
            container.innerHTML = '';

            if (studyData.length === 0) {
                container.innerHTML = `<p class="text-slate-400">No subjects found to report.</p>`;
                return;
            }

            studyData.forEach((sub, sIdx) => {
                let totalTasks = sub.chapters.length * 4;
                let completedTasks = 0;
                sub.chapters.forEach(c => {
                    if(c.mcq) completedTasks++;
                    if(c.book) completedTasks++;
                    if(c.testPaper) completedTasks++;
                    if(c.qb) completedTasks++;
                });

                const percentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

                const card = document.createElement('div');
                card.className = "glass-card p-8 rounded-3xl animate-fade flex flex-col md:flex-row items-center gap-10";
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <h2 class="text-3xl font-black text-slate-800 mb-2">${sub.name}</h2>
                        <div class="w-full bg-slate-200 h-3 rounded-full mb-4">
                            <div class="bg-indigo-600 h-3 rounded-full transition-all duration-1000" style="width: ${percentage}%"></div>
                        </div>
                        <p class="font-bold text-indigo-600">${percentage}% Complete</p>
                    </div>
                    <div class="w-40 h-40">
                        <canvas id="chart-${sIdx}"></canvas>
                    </div>
                `;
                container.appendChild(card);

                new Chart(document.getElementById(`chart-${sIdx}`), {
                    type: 'doughnut',
                    data: {
                        labels: ['Done', 'Left'],
                        datasets: [{ data: [completedTasks, totalTasks - completedTasks], backgroundColor: ['#4f46e5', '#e2e8f0'], borderWidth: 0 }]
                    },
                    options: { plugins: { legend: { display: false } }, cutout: '70%' }
                });
            });
        }

        loadReports();
    </script>
</body>
</html>
