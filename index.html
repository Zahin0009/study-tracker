<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="flex gap-4">
                <a href="index.html" class="nav-link" style="color:var(--primary)">Dashboard</a>
                <a href="calendar.html" class="nav-link">Calendar</a>
                <a href="reports.html" class="nav-link">Reports</a>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="themeBtn"></button>
                <a href="profile.html"><img id="navAvatar" src="https://ui-avatars.com/api/?name=User" class="nav-avatar"></a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">My Syllabus</h1>
            <button onclick="addSubject()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">+ Subject</button>
        </div>

        <div id="subjectContainer">
            </div>
    </main>

    <script>
        let studyData = [];

        async function init() {
            const user = await checkUser();
            if (!user) return;
            loadNavAvatar();

            const { data } = await supabaseClient.from('study_progress').select('data_json').eq('user_id', user.id).maybeSingle();
            studyData = data?.data_json || [];
            render();
        }

        function calculateProgress(sub) {
            if (!sub.chapters.length) return 0;
            let total = sub.chapters.length * 4;
            let done = 0;
            sub.chapters.forEach(c => {
                if(c.mcq) done++; if(c.book) done++; if(c.testPaper) done++; if(c.qb) done++;
            });
            return Math.round((done / total) * 100);
        }

        async function toggleProgress(sIdx, cIdx, field, checkbox) {
            // Update local data
            studyData[sIdx].chapters[cIdx][field] = checkbox.checked;
            
            // Update the progress bar for THIS card only (No full render = No flicker)
            const percent = calculateProgress(studyData[sIdx]);
            document.getElementById(`fill-${sIdx}`).style.width = percent + '%';
            document.getElementById(`text-${sIdx}`).innerText = percent + '% Completed';

            // Background Save
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('study_progress').upsert({ user_id: user.id, data_json: studyData });
        }

        function render() {
            const container = document.getElementById('subjectContainer');
            container.innerHTML = studyData.map((sub, sIdx) => {
                const percent = calculateProgress(sub);
                return `
                <div class="glass-card animate-fade">
                    <div class="flex justify-between items-end">
                        <h2 class="text-2xl font-black">${sub.name}</h2>
                        <span id="text-${sIdx}" class="text-sm font-bold text-indigo-500">${percent}% Completed</span>
                    </div>
                    
                    <div class="progress-track"><div id="fill-${sIdx}" class="progress-fill" style="width:${percent}%"></div></div>
                    
                    <div class="mt-4">
                        ${sub.chapters.map((chap, cIdx) => `
                            <div class="chapter-row">
                                <span class="font-bold">${chap.name}</span>
                                <div class="checkbox-group">
                                    <div class="item-check"><label>MCQ</label><input type="checkbox" ${chap.mcq ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'mcq', this)"></div>
                                    <div class="item-check"><label>BOOK</label><input type="checkbox" ${chap.book ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'book', this)"></div>
                                    <div class="item-check"><label>TEST</label><input type="checkbox" ${chap.testPaper ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'testPaper', this)"></div>
                                    <div class="item-check"><label>QB</label><input type="checkbox" ${chap.qb ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'qb', this)"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 flex gap-4">
                        <button onclick="addChapter(${sIdx})" class="text-indigo-500 text-sm font-bold">+ Chapter</button>
                        <button onclick="deleteSubject(${sIdx})" class="text-red-400 text-sm font-bold">Delete Subject</button>
                    </div>
                </div>
            `}).join('');
        }

        async function addSubject() {
            const name = prompt("Subject Name:");
            if (name) { studyData.push({ name, chapters: [] }); await save(); render(); }
        }

        async function addChapter(sIdx) {
            const name = prompt("Chapter Name:");
            if (name) { 
                studyData[sIdx].chapters.push({ name, mcq: false, book: false, testPaper: false, qb: false }); 
                await save(); render(); 
            }
        }

        async function deleteSubject(sIdx) {
            if(confirm("Delete subject?")) { studyData.splice(sIdx, 1); await save(); render(); }
        }

        async function save() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('study_progress').upsert({ user_id: user.id, data_json: studyData });
        }

        init();
    </script>
</body>
</html>
