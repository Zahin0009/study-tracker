<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white/80 sticky top-0 z-50 backdrop-blur-md border-b border-slate-200 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex gap-8 font-semibold text-slate-600">
                <a href="index.html" class="text-indigo-600 font-bold">Dashboard</a>
                <a href="calendar.html" class="hover:text-indigo-600 transition">Calendar</a>
                <a href="reports.html" class="hover:text-indigo-600 transition">Reports</a>
            </div>
            <button onclick="supabaseClient.auth.signOut().then(() => location.reload())" class="text-sm font-bold text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg transition">Sign Out</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">My Syllabus</h1>
                <p class="text-slate-500 mt-1">Cloud Synced Tracker</p>
            </div>
            <button onclick="addSubject()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold hover:scale-105 transition shadow-lg shadow-indigo-200">
                + Add Subject
            </button>
        </header>

        <div id="subjectContainer" class="grid gap-8">
            <div class="text-center py-20">
                <p class="text-slate-400 animate-pulse">Syncing with cloud...</p>
            </div>
        </div>
    </main>

    <script>
        let studyData = [];

        async function init() {
            const user = await checkUser();
            if (!user) return; // checkUser handles redirect to login.html

            const { data, error } = await supabaseClient
                .from('study_progress')
                .select('data_json')
                .eq('user_id', user.id)
                .maybeSingle(); // maybeSingle prevents errors if row doesn't exist yet

            if (data && data.data_json) {
                studyData = data.data_json;
            } else {
                studyData = [];
            }
            render();
        }

        async function save() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;

            const { error } = await supabaseClient
                .from('study_progress')
                .upsert({ 
                    user_id: user.id, 
                    data_json: studyData 
                });

            if (error) console.error("Cloud Save Error:", error);
            render();
        }

        // Logic Functions
        function addSubject() {
            const name = prompt("Enter Subject Name:");
            if (name) { studyData.push({ name, chapters: [] }); save(); }
        }

        function addChapter(sIdx) {
            const name = prompt("Enter Chapter Name:");
            if (name) { 
                studyData[sIdx].chapters.push({ name, mcq: false, book: false, testPaper: false, qb: false }); 
                save(); 
            }
        }

        function toggleProgress(sIdx, cIdx, field) {
            studyData[sIdx].chapters[cIdx][field] = !studyData[sIdx].chapters[cIdx][field];
            save();
        }

        function editChapter(sIdx, cIdx) {
            const newName = prompt("Rename Chapter:", studyData[sIdx].chapters[cIdx].name);
            if (newName) { studyData[sIdx].chapters[cIdx].name = newName; save(); }
        }

        function deleteChapter(sIdx, cIdx) {
            if(confirm("Delete this chapter?")) { studyData[sIdx].chapters.splice(cIdx, 1); save(); }
        }

        function deleteSubject(sIdx) {
            if(confirm("Delete entire subject?")) { studyData.splice(sIdx, 1); save(); }
        }

        function render() {
            const container = document.getElementById('subjectContainer');
            if (studyData.length === 0) {
                container.innerHTML = `<div class="glass-card p-10 text-center rounded-3xl"><p class="text-slate-400">No subjects yet. Add one to begin!</p></div>`;
                return;
            }
            container.innerHTML = studyData.map((sub, sIdx) => `
                <div class="glass-card p-8 rounded-3xl animate-fade">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black text-slate-800">${sub.name}</h2>
                        <button onclick="deleteSubject(${sIdx})" class="text-slate-400 hover:text-red-500 transition text-sm">Remove</button>
                    </div>
                    <button onclick="addChapter(${sIdx})" class="mb-6 text-sm bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold hover:bg-indigo-100 transition">
                        + New Chapter
                    </button>
                    <div class="space-y-4">
                        ${sub.chapters.map((chap, cIdx) => `
                            <div class="flex flex-wrap items-center justify-between p-5 bg-white/40 rounded-2xl border border-white/50">
                                <span class="font-bold text-slate-700">${chap.name}</span>
                                <div class="flex gap-4 items-center">
                                    <label class="text-xs font-bold"><input type="checkbox" ${chap.mcq ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'mcq')"> MCQ</label>
                                    <label class="text-xs font-bold"><input type="checkbox" ${chap.book ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'book')"> BOOK</label>
                                    <label class="text-xs font-bold"><input type="checkbox" ${chap.testPaper ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'testPaper')"> TEST</label>
                                    <label class="text-xs font-bold"><input type="checkbox" ${chap.qb ? 'checked' : ''} onchange="toggleProgress(${sIdx}, ${cIdx}, 'qb')"> QB</label>
                                    <button onclick="editChapter(${sIdx}, ${cIdx})" class="ml-4 text-indigo-400 hover:text-indigo-600 text-xs font-bold">EDIT</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Start the app
        init();
    </script>
</body>
</html>
