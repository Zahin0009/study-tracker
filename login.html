<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="glass-card p-10 rounded-3xl w-full max-w-md animate-fade">
        <h1 class="text-3xl font-black text-slate-800 mb-2">Study Sync</h1>
        <p class="text-slate-500 mb-8">Login or Create Account</p>
        
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
            
            <button onclick="auth('in')" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition">
                Sign In
            </button>
            <button onclick="auth('up')" class="w-full bg-white text-indigo-600 p-4 rounded-2xl font-bold border border-indigo-600 hover:bg-slate-50 transition">
                Sign Up
            </button>
        </div>
    </div>

    <script>
        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please fill in all fields");
                return;
            }

            const { data, error } = type === 'in' 
                ? await supabaseClient.auth.signInWithPassword({ email, password })
                : await supabaseClient.auth.signUp({ email, password });
            
            if (error) {
                alert(error.message);
            } else if (type === 'up') {
                alert("Check your email for a verification link!");
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
