<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white/80 sticky top-0 z-50 backdrop-blur-md border-b border-slate-200 p-4">
        <div class="max-w-5xl mx-auto flex gap-8 font-semibold text-slate-600">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="calendar.html" class="nav-link">Calendar</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="profile.html" class="nav-link text-indigo-600 font-bold">Profile</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-10">
        <div class="glass-card p-10 rounded-[2rem] animate-fade shadow-2xl shadow-indigo-100/50">
            <div class="text-center mb-8">
                <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-4 border-4 border-white shadow-inner">
                    <span id="initials">??</span>
                </div>
                <h1 class="text-3xl font-black text-slate-800">My Profile</h1>
                <p class="text-slate-400">Manage your personal study identity</p>
            </div>

            <div class="space-y-6">
                <div class="group">
                    <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">Full Name</label>
                    <input id="userName" type="text" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-white/50" placeholder="Enter your name">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">Contact Info / Email</label>
                    <input id="userContact" type="text" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-white/50" placeholder="Phone or secondary email">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">Academic Goal</label>
                    <textarea id="userGoal" rows="3" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-white/50" placeholder="e.g. Aiming for 4.0 GPA this semester"></textarea>
                </div>

                <button onclick="saveProfile()" id="saveBtn" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold hover:bg-indigo-700 hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-indigo-200">
                    Update Profile
                </button>
            </div>
        </div>
    </main>

    <script>
        async function loadProfile() {
            const user = await checkUser();
            if(!user) return;

            const { data } = await supabaseClient.from('study_progress').select('profile_json').eq('user_id', user.id).maybeSingle();
            
            if (data?.profile_json) {
                document.getElementById('userName').value = data.profile_json.name || '';
                document.getElementById('userContact').value = data.profile_json.contact || '';
                document.getElementById('userGoal').value = data.profile_json.goal || '';
                updateInitials(data.profile_json.name);
            }
        }

        async function saveProfile() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            
            const user = (await supabaseClient.auth.getUser()).data.user;
            const profileData = {
                name: document.getElementById('userName').value,
                contact: document.getElementById('userContact').value,
                goal: document.getElementById('userGoal').value
            };

            const { error } = await supabaseClient.from('study_progress').upsert({ 
                user_id: user.id, 
                profile_json: profileData 
            });

            if(!error) {
                btn.innerText = "Update Profile";
                updateInitials(profileData.name);
                alert("Profile synced successfully! ✨");
            }
        }

        function updateInitials(name) {
            if(name) {
                const parts = name.split(' ');
                document.getElementById('initials').innerText = parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0][0].toUpperCase();
            }
        }

        loadProfile();
    </script>
</body>
</html>
