<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile Specific Styles */
        .profile-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
        }

        /* The Round & Readable Input Fix */
        .pill-input {
            width: 100%;
            /* Force a light, high-contrast background for text visibility */
            background: #ffffff !important; 
            /* Force dark text color so it's always readable */
            color: #1e293b !important; 
            border: 2px solid #e2e8f0;
            border-radius: 50px; /* Makes it perfectly round */
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .pill-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            transform: scale(1.02);
        }

        .pill-textarea {
            border-radius: 25px !important;
            resize: none;
        }

        .label-text {
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 20px;
            margin-bottom: 8px;
            display: block;
            color: var(--text);
        }

        .save-btn {
            background: var(--primary);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 20px;
            border-radius: 50px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="flex gap-4">
                <a href="index.html" class="nav-link font-bold">Dashboard</a>
                <a href="calendar.html" class="nav-link font-bold">Calendar</a>
                <a href="reports.html" class="nav-link font-bold">Reports</a>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="themeBtn"></button>
                <a href="profile.html"><img id="navAvatar" src="https://ui-avatars.com/api/?name=User" class="nav-avatar"></a>
            </div>
        </div>
    </nav>

    <main class="flex justify-center items-center min-h-[calc(100vh-72px)] p-6">
        <div class="profile-card animate-fade">
            <div class="flex flex-col items-center mb-10">
                <img id="profilePreview" src="https://ui-avatars.com/api/?name=User" 
                     class="w-28 h-28 rounded-full border-4 border-white shadow-xl mb-4">
                <h2 id="userNameDisplay" class="text-2xl font-black" style="color: var(--text)">Student Profile</h2>
                <input type="file" id="imgUpload" class="hidden" onchange="uploadImage(this)">
                <button onclick="document.getElementById('imgUpload').click()" class="text-indigo-500 font-bold text-xs mt-2 hover:underline">Change Photo</button>
            </div>

            <div class="form-group">
                <label class="label-text">Full Name</label>
                <input id="userName" type="text" class="pill-input" placeholder="Enter your name...">
            </div>

            <div class="form-group">
                <label class="label-text">Home Address</label>
                <textarea id="userAddress" rows="3" class="pill-input pill-textarea" placeholder="Enter your address..."></textarea>
            </div>

            <button onclick="saveProfile()" class="save-btn">Save Profile</button>
            
            <div class="flex justify-center mt-6 gap-6">
                <button onclick="handleLogout()" class="text-red-500 font-bold text-sm">Sign Out</button>
            </div>
        </div>
    </main>

    <script>
        async function loadProfile() {
            const user = await checkUser();
            if(!user) return;
            loadNavAvatar();

            const { data } = await supabaseClient.from('study_progress').select('profile_json, avatar_url').eq('user_id', user.id).maybeSingle();
            
            if (data?.profile_json) {
                document.getElementById('userName').value = data.profile_json.name || '';
                document.getElementById('userAddress').value = data.profile_json.address || '';
                document.getElementById('userNameDisplay').innerText = data.profile_json.name || "Student Profile";
            }
            if (data?.avatar_url) {
                document.getElementById('profilePreview').src = data.avatar_url;
            }
        }

        async function saveProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const profileData = {
                name: document.getElementById('userName').value,
                address: document.getElementById('userAddress').value
            };

            await supabaseClient.from('study_progress').upsert({ 
                user_id: user.id, 
                profile_json: profileData 
            });
            
            document.getElementById('userNameDisplay').innerText = profileData.name;
            alert("Profile Updated!");
        }

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            const filePath = `${user.id}/avatar-${Date.now()}`;
            
            await supabaseClient.storage.from('avatars').upload(filePath, file);
            const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
            
            await supabaseClient.from('study_progress').upsert({ user_id: user.id, avatar_url: publicUrl });
            document.getElementById('profilePreview').src = publicUrl;
            document.getElementById('navAvatar').src = publicUrl;
        }

        function handleLogout() {
            supabaseClient.auth.signOut().then(() => window.location.href = 'login.html');
        }

        loadProfile();
    </script>
</body>
</html>
