<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="flex gap-4">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="calendar.html" class="nav-link" style="color:var(--primary)">Calendar</a>
                <a href="reports.html" class="nav-link">Reports</a>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" id="themeBtn"></button>
                <a href="profile.html"><img id="navAvatar" src="https://ui-avatars.com/api/?name=User" class="nav-avatar"></a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto p-6">
        <div id="calendar" class="animate-fade"></div>
    </main>

    <script>
        let calendar;

        async function init() {
            const user = await checkUser();
            if (!user) return;
            loadNavAvatar();

            const { data } = await supabaseClient.from('study_progress').select('calendar_json').eq('user_id', user.id).maybeSingle();
            
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                slotMinTime: '06:00:00',
                slotMaxTime: '24:00:00',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                height: '80vh',
                nowIndicator: true,
                editable: true,
                selectable: true,
                events: data?.calendar_json || [],
                select: async (info) => {
                    const title = prompt('Event Title:');
                    if (title) {
                        calendar.addEvent({ title, start: info.startStr, end: info.endStr });
                        await save();
                    }
                    calendar.unselect();
                },
                eventClick: async (info) => {
                    if (confirm('Delete event?')) {
                        info.event.remove();
                        await save();
                    }
                },
                eventChange: save
            });
            calendar.render();
        }

        async function save() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const events = calendar.getEvents().map(e => ({
                title: e.title, start: e.startStr, end: e.endStr
            }));
            await supabaseClient.from('study_progress').upsert({ user_id: user.id, calendar_json: events });
        }
        init();
    </script>
</body>
</html>
